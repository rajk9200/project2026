<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Professional Responsive Dashboard</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background-color: #f8f9fa;
    }

    .sidebar {
      min-height: 100vh;
      background: #111827;
      color: #fff;
      transition: all 0.3s;
    }

    .sidebar a {
      color: #cbd5e1;
      text-decoration: none;
      padding: 12px 20px;
      display: block;
      border-radius: 8px;
      margin: 4px 10px;
    }

    .sidebar a:hover {
      background: #1f2937;
      color: #fff;
    }

    .card {
      border: none;
      border-radius: 16px;
    }

    .topbar {
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
    }

    @media (max-width: 768px) {
      .sidebar {
        min-height: auto;
      }
    }
  </style>
</head>

<body>

<div class="container-fluid">
  <div class="row">

    <!-- Sidebar -->
    <div class="col-md-2 sidebar p-3">
      <h4 class="text-center mb-4">Admin Panel 204</h4>
      <a href="#"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="#"><i class="bi bi-people"></i> Users</a>
      <a href="#"><i class="bi bi-bar-chart"></i> Reports</a>
      <a href="#"><i class="bi bi-gear"></i> Settings</a>
      <a href="#"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>

    <!-- Main Content -->
    <div class="col-md-10 p-0">

      <!-- Top Navbar -->
      <nav class="navbar topbar px-4">
        <span class="navbar-brand mb-0 h5">Dashboard</span>
        <div>
          <i class="bi bi-bell me-3"></i>
          <i class="bi bi-person-circle"></i>
        </div>
      </nav>

      <div class="p-4">

        <!-- Stats Cards -->
        <div class="row g-4">

          <div class="col-12 col-sm-6 col-lg-3">
            <div class="card shadow-sm p-3">
              <div class="d-flex justify-content-between">
                <div>
                  <h6>Total Users</h6>
                  <h3 class="text-primary">1,250</h3>
                </div>
                <i class="bi bi-people fs-1 text-primary"></i>
              </div>
            </div>
          </div>

          <div class="col-12 col-sm-6 col-lg-3">
            <div class="card shadow-sm p-3">
              <div class="d-flex justify-content-between">
                <div>
                  <h6>Revenue</h6>
                  <h3 class="text-success">$8,400</h3>
                </div>
                <i class="bi bi-currency-dollar fs-1 text-success"></i>
              </div>
            </div>
          </div>

          <div class="col-12 col-sm-6 col-lg-3">
            <div class="card shadow-sm p-3">
              <div class="d-flex justify-content-between">
                <div>
                  <h6>Orders</h6>
                  <h3 class="text-warning">320</h3>
                </div>
                <i class="bi bi-cart fs-1 text-warning"></i>
              </div>
            </div>
          </div>

          <div class="col-12 col-sm-6 col-lg-3">
            <div class="card shadow-sm p-3">
              <div class="d-flex justify-content-between">
                <div>
                  <h6>Pending</h6>
                  <h3 class="text-danger">45</h3>
                </div>
                <i class="bi bi-clock fs-1 text-danger"></i>
              </div>
            </div>
          </div>

        </div>

        <!-- Table -->
        <div class="card shadow-sm mt-5">
          <div class="card-header bg-white">
            Recent Activity
          </div>
          <div class="card-body table-responsive">
            <table class="table align-middle">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Status</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Rahul</td>
                  <td>rahul@example.com</td>
                  <td><span class="badge bg-success">Active</span></td>
                  <td><button class="btn btn-sm btn-outline-primary">View</button></td>
                </tr>
                <tr>
                  <td>Amit</td>
                  <td>amit@example.com</td>
                  <td><span class="badge bg-warning">Pending</span></td>
                  <td><button class="btn btn-sm btn-outline-primary">View</button></td>
                </tr>
                <tr>
                  <td>Sneha</td>
                  <td>sneha@example.com</td>
                  <td><span class="badge bg-danger">Blocked</span></td>
                  <td><button class="btn btn-sm btn-outline-primary">View</button></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
